# Production конфигурация MTS MultAgent System
# Настройки для production-окружения

# Базовые настройки
app:
  name: "MTS MultAgent System"
  version: "1.0.0"
  environment: "production"
  debug: false
  log_level: "INFO"

# Настройки LLM (языковые модели)
llm:
  provider: "openai"
  model: "gpt-4"
  api_key: "${OPENAI_API_KEY}"
  max_tokens: 4000
  temperature: 0.1
  timeout: 30
  retry_attempts: 3
  retry_delay: 1

# Настройки JIRA
jira:
  url: "${JIRA_URL}"
  username: "${JIRA_USERNAME}"
  api_token: "${JIRA_API_TOKEN}"
  timeout: 30
  retry_attempts: 3
  batch_size: 50
  project_keys: ["PROJ", "DEV", "QA"]

# Настройки Confluence
confluence:
  url: "${CONFLUENCE_URL}"
  username: "${CONFLUENCE_USERNAME}"
  api_token: "${CONFLUENCE_API_TOKEN}"
  timeout: 30
  retry_attempts: 3
  space_key: "DOC"

# Настройки базы данных
database:
  type: "json"
  path: "./data"
  backup_interval: 3600  # 1 час
  max_file_size: "100MB"
  compression: true

# Настройки оркестрации
orchestrator:
  workflow:
    max_parallel_agents: 4
    agent_timeout: 300  # 5 минут
    enable_data_sharing: true
    fail_fast: false
  monitoring:
    health_check_interval: 60  # 1 минута
    metrics_collection: true
    alert_threshold: 0.8

# Настройки планировщика
scheduler:
  enabled: true
  timezone: "Europe/Moscow"
  jobs:
    daily_jira_analysis:
      enabled: true
      cron: "0 8 * * 1-5"  # Будни в 8:00
      agent: "daily_jira_analyzer"
    daily_meeting_analysis:
      enabled: true
      cron: "0 18 * * 1-5"  # Будни в 18:00
      agent: "daily_meeting_analyzer"
    health_check:
      enabled: true
      cron: "*/10 * * * *"  # Каждые 10 минут
      agent: "health_monitor"

# Настройки логирования
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    file:
      enabled: true
      path: "./logs/app.log"
      max_size: "50MB"
      backup_count: 5
      rotation: "daily"
    console:
      enabled: true
      level: "INFO"
    error_file:
      enabled: true
      path: "./logs/error.log"
      level: "ERROR"
      max_size: "20MB"
      backup_count: 10
    performance_file:
      enabled: true
      path: "./logs/performance.log"
      level: "INFO"
      format: "%(asctime)s - %(message)s"

# Настройки безопасности
security:
  encryption:
    enabled: true
    algorithm: "AES-256-GCM"
  authentication:
    enabled: false  # Включить если нужен веб-интерфейс
    session_timeout: 3600
  rate_limiting:
    enabled: true
    requests_per_minute: 100
  audit:
    enabled: true
    log_level: "INFO"

# Настройки мониторинга
monitoring:
  metrics:
    enabled: true
    collection_interval: 60
    retention_days: 30
  alerts:
    enabled: true
    email_notifications: false
    webhook_url: "${WEBHOOK_URL:}"
  health_checks:
    enabled: true
    endpoints:
      - name: "database"
        url: "/health/db"
        timeout: 5
      - name: "llm"
        url: "/health/llm"
        timeout: 10
      - name: "agents"
        url: "/health/agents"
        timeout: 15

# Настройки производительности
performance:
  caching:
    enabled: true
    ttl: 3600  # 1 час
    max_size: "100MB"
  connection_pooling:
    enabled: true
    max_connections: 10
    timeout: 30
  async_workers: 4
  batch_processing:
    enabled: true
    batch_size: 20
    timeout: 60

# Настройки качества данных
quality:
  validation:
    enabled: true
    strict_mode: false
  quality_thresholds:
    data_completeness: 0.8
    analysis_accuracy: 0.7
    response_time: 5.0  # секунды
  auto_correction:
    enabled: true
    max_attempts: 3

# Настройки уведомлений
notifications:
  email:
    enabled: false
    smtp_server: "${SMTP_SERVER:}"
    smtp_port: 587
    username: "${SMTP_USERNAME:}"
    password: "${SMTP_PASSWORD:}"
    from_address: "noreply@mts.ru"
    to_addresses: []
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL:}"
    channel: "#alerts"
  teams:
    enabled: false
    webhook_url: "${TEAMS_WEBHOOK_URL:}"

# Настройки резервного копирования
backup:
  enabled: true
  schedule: "0 2 * * *"  # Ежедневно в 2:00
  retention_days: 30
  compression: true
  encryption: true
  destinations:
    - type: "local"
      path: "./backups"
    - type: "s3"  # Опционально
      bucket: "${S3_BUCKET:}"
      access_key: "${AWS_ACCESS_KEY:}"
      secret_key: "${AWS_SECRET_KEY:}"

# Настройки API (если нужен веб-интерфейс)
api:
  enabled: false
  host: "0.0.0.0"
  port: 8080
  workers: 4
  cors:
    enabled: true
    origins: ["http://localhost:3000"]
  authentication:
    enabled: false
    jwt_secret: "${JWT_SECRET:}"
    token_expiry: 3600

# Настройки интеграций
integrations:
  active_directory:
    enabled: false
    server: "${AD_SERVER:}"
    domain: "${AD_DOMAIN:}"
  ldap:
    enabled: false
    server: "${LDAP_SERVER:}"
    base_dn: "${LDAP_BASE_DN:}"
  webhook:
    enabled: true
    secret: "${WEBHOOK_SECRET:}"
    allowed_ips: ["127.0.0.1", "10.0.0.0/8"]

# Пути к файлам и директориям
paths:
  logs: "./logs"
  data: "./data"
  temp: "./temp"
  backups: "./backups"
  uploads: "./uploads"
  certificates: "./certs"

# Ограничения ресурсов
resource_limits:
  max_memory_usage: "2GB"
  max_cpu_usage: 80  # процентов
  max_disk_usage: "10GB"
  max_concurrent_requests: 50

# Настройки отладки (production-safe)
debug:
  slow_query_threshold: 2.0  # секунды
  error_traceback: false
  profiling: false
  memory_profiling: false

# Специфичные настройки окружения
production:
  graceful_shutdown_timeout: 30
  health_check_timeout: 10
  metrics_retention_days: 90
  audit_retention_days: 365
  backup_compression_level: 6

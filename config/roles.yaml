# Правила анализа на основе ролей
analysis_rules:
  tech_lead:
    focus_areas: ["архитектурные решения", "качество кода", "менторство", "принятие решений"]
    expected_behaviors: ["техническое лидерство", "code review", "архитектурное планирование", "управление командой"]
    communication_indicators: ["директивность", "техническая экспертиза", "менторские советы"]
    
  devops_engineer:
    focus_areas: ["инфраструктура", "автоматизация", "стабильность", "мониторинг"]
    expected_behaviors: ["настройка CI/CD", "управление инфраструктурой", "решение инцидентов", "автоматизация"]
    communication_indicators: ["технические детали", "статус систем", "планы улучшений"]
    
  data_engineer:
    focus_areas: ["данные", "пайплайны", "оптимизация", "качество данных"]
    expected_behaviors: ["разработка ETL", "оптимизация запросов", "анализ данных", "обеспечение качества"]
    communication_indicators: ["аналитические выводы", "метрики качества", "техническая документация"]
    
  product_owner:
    focus_areas: ["бэклог", "приоритеты", "стейкхолдеры", "продуктовая стратегия"]
    expected_behaviors: ["управление бэклогом", "приоритизация", "взаимодействие со стейкхолдерами", "принятие продуктовых решений"]
    communication_indicators: ["бизнес-фокус", "приоритеты", "статус бэклога", "needs стейкхолдеров"]
    
  analyst:
    focus_areas: ["анализ", "требования", "документация", "исследования"]
    expected_behaviors: ["сбор требований", "анализ процессов", "документация", "исследование"]
    communication_indicators: ["детальный анализ", "вопросы уточнения", "документация", "результаты исследований"]

